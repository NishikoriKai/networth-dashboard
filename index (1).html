<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資產儀表板</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#080810;--bg2:#0d0d18;--bg3:#12121f;--glass:rgba(255,255,255,.043);--glass2:rgba(255,255,255,.072);--glass3:rgba(255,255,255,.10);--rim:rgba(255,255,255,.08);--rim2:rgba(255,255,255,.14);--ink:#eeeef5;--ink2:rgba(238,238,245,.52);--ink3:rgba(238,238,245,.28);--ink4:rgba(238,238,245,.10);--blue:#4fa3ff;--blue3:rgba(79,163,255,.10);--violet:#9b8cff;--teal:#36d9b8;--coral:#ff6b6b;--green:#3ecf8e;--green2:rgba(62,207,142,.13);--red2:rgba(255,107,107,.13);--r:20px;--r2:14px}
.L{--bg:#f0f0f7;--bg2:#e8e8f2;--bg3:#fff;--glass:rgba(255,255,255,.72);--glass2:rgba(255,255,255,.88);--glass3:rgba(0,0,0,.05);--rim:rgba(0,0,0,.07);--rim2:rgba(0,0,0,.12);--ink:#16161e;--ink2:rgba(22,22,30,.52);--ink3:rgba(22,22,30,.28);--ink4:rgba(22,22,30,.08);--blue3:rgba(60,140,255,.07);--green2:rgba(30,160,100,.10);--red2:rgba(200,50,50,.10)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;transition:background .35s,color .35s}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 40% at 18% 8%,rgba(79,163,255,.07),transparent 68%),radial-gradient(ellipse 45% 35% at 82% 82%,rgba(155,140,255,.055),transparent 68%);z-index:0}
body>*{position:relative;z-index:1}
/* LOGIN */
#loginScreen{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:opacity .5s}
.lc{background:var(--glass);border:1px solid var(--rim2);border-radius:28px;padding:44px 36px 36px;text-align:center;backdrop-filter:blur(24px);box-shadow:0 0 0 1px rgba(255,255,255,.04) inset,0 32px 64px rgba(0,0,0,.45);width:330px;animation:lup .7s cubic-bezier(.22,1,.36,1) both}
@keyframes lup{from{opacity:0;transform:translateY(22px) scale(.97)}to{opacity:1;transform:none}}
.lc-icon{width:60px;height:60px;background:linear-gradient(145deg,#1a2a4a,#0d1a33);border:1px solid rgba(79,163,255,.35);border-radius:17px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(79,163,255,.18),inset 0 1px 0 rgba(255,255,255,.10)}
.lc-icon svg{width:26px;height:26px}
.lc-h{font-family:'DM Serif Display',serif;font-size:21px;margin-bottom:4px}
.lc-s{font-size:12.5px;color:var(--ink2);margin-bottom:28px;font-weight:300}
.pin-row{display:flex;gap:12px;justify-content:center;margin-bottom:26px}
.pd{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--rim2);transition:all .16s}
.pd.on{background:var(--blue);border-color:var(--blue);box-shadow:0 0 7px var(--blue);transform:scale(1.1)}
.pd.err{background:var(--coral);border-color:var(--coral);animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}60%{transform:translateX(5px)}}
.np{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.nb{background:var(--glass);border:1px solid var(--rim);border-radius:13px;padding:14px 8px;font-family:'DM Serif Display',serif;font-size:21px;color:var(--ink);cursor:pointer;transition:all .13s;user-select:none}
.nb:hover{background:var(--glass2);border-color:var(--rim2);transform:scale(.97)}
.nb:active{transform:scale(.91)}
.nb.sm{grid-column:span 2;font-family:'DM Sans',sans-serif;font-size:12.5px;color:var(--ink2);font-weight:500}
.nb.ok{background:linear-gradient(135deg,rgba(79,163,255,.25),rgba(79,163,255,.12));border-color:rgba(79,163,255,.4);color:var(--blue);font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:600}
.lc-err{font-size:12px;color:var(--coral);margin-top:10px;min-height:18px}
/* LOADING */
#loadingScreen{position:fixed;inset:0;z-index:150;display:none;align-items:center;justify-content:center;background:var(--bg);flex-direction:column;gap:16px}
.spinner{width:36px;height:36px;border:2px solid var(--rim2);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--ink2)}
/* APP */
#app{display:none}
.topbar{display:flex;align-items:center;padding:0 26px;height:56px;background:rgba(8,8,16,.75);border-bottom:1px solid var(--rim);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50}
.L .topbar{background:rgba(240,240,247,.82)}
.brand{font-family:'DM Serif Display',serif;font-size:16px;letter-spacing:-.2px;display:flex;align-items:center;gap:8px}
.bdot{width:7px;height:7px;border-radius:50%;background:var(--blue);box-shadow:0 0 7px var(--blue)}
.tc{flex:1;display:flex;justify-content:center}
.mnav{display:flex;align-items:center;gap:10px;background:var(--glass);border:1px solid var(--rim);border-radius:22px;padding:5px 14px;font-size:12.5px;font-weight:500}
.mnav button{background:none;border:none;color:var(--ink2);cursor:pointer;font-size:15px;transition:color .2s}
.mnav button:hover{color:var(--ink)}
.mnav span{min-width:84px;text-align:center}
.tr2{display:flex;gap:7px;align-items:center}
.tbtn{background:var(--glass);border:1px solid var(--rim);border-radius:19px;padding:5px 13px;font-size:12px;font-weight:500;color:var(--ink2);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px}
.tbtn:hover{background:var(--glass2);border-color:var(--rim2);color:var(--ink)}
.tbtn.pri{background:linear-gradient(135deg,rgba(79,163,255,.28),rgba(79,163,255,.13));border-color:rgba(79,163,255,.42);color:var(--blue)}
/* CURRENCY */
.cstrip{display:flex;align-items:center;gap:6px;padding:13px 26px 0}
.cpill{padding:4px 13px;border-radius:15px;font-size:11.5px;font-weight:500;border:1px solid var(--rim);color:var(--ink2);background:transparent;cursor:pointer;transition:all .2s}
.cpill.on{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 0 10px rgba(79,163,255,.28)}
.rbadge{margin-left:auto;font-size:11px;color:var(--ink3);display:flex;align-items:center;gap:5px}
.rdot{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
/* GRID */
main{padding:18px 26px 48px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:1200px;margin:0 auto}
.card{background:var(--glass);border:1px solid var(--rim);border-radius:var(--r);backdrop-filter:blur(20px);position:relative;overflow:hidden;transition:border-color .22s;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,var(--rim2) 50%,transparent 95%);pointer-events:none}
.card:hover{border-color:var(--rim2)}
.card:nth-child(1){animation-delay:.04s}.card:nth-child(2){animation-delay:.08s}.card:nth-child(3){animation-delay:.11s}.card:nth-child(4){animation-delay:.14s}.card:nth-child(5){animation-delay:.17s}.card:nth-child(6){animation-delay:.20s}.card:nth-child(7){animation-delay:.23s}.card:nth-child(8){animation-delay:.26s}
/* HERO */
.c-hero{grid-column:span 2;padding:26px 28px 22px;background:linear-gradient(145deg,rgba(79,163,255,.07),transparent 55%),var(--glass);border-color:rgba(79,163,255,.18)}
.c-hero::after{content:'';position:absolute;bottom:0;right:0;width:160px;height:160px;background:radial-gradient(circle,rgba(79,163,255,.07),transparent 70%);pointer-events:none}
.h-lbl{font-size:11px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;color:var(--ink3);margin-bottom:9px}
.h-val{font-family:'DM Serif Display',serif;font-size:44px;letter-spacing:-2px;line-height:1;margin-bottom:5px;background:linear-gradient(135deg,#eeeef5,#8ab8f0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.L .h-val{background:linear-gradient(135deg,#16161e,#2a5a9a);-webkit-background-clip:text;background-clip:text}
.h-sub{font-size:12.5px;color:var(--ink2);margin-bottom:16px}
.h-badge{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:9px;font-size:12.5px;font-weight:600}
.up{background:var(--green2);color:var(--green);border:1px solid rgba(62,207,142,.18)}
.dn{background:var(--red2);color:var(--coral);border:1px solid rgba(255,107,107,.18)}
/* STAT */
.c-stat{padding:20px 20px 18px}
.s-lbl{font-size:10.5px;font-weight:500;letter-spacing:.7px;text-transform:uppercase;color:var(--ink3);margin-bottom:9px;display:flex;align-items:center;gap:6px}
.s-ico{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px}
.s-num{font-family:'DM Serif Display',serif;font-size:26px;letter-spacing:-1px;line-height:1;margin-bottom:7px}
.s-chg{display:inline-flex;align-items:center;gap:3px;font-size:11.5px;font-weight:600;padding:3px 7px;border-radius:6px}
/* TREND */
.c-trend{grid-column:span 3;padding:22px 24px 16px}
.c-title{font-size:11px;font-weight:500;letter-spacing:.65px;text-transform:uppercase;color:var(--ink3);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
/* ALLOC */
.c-alloc{padding:22px 20px}
.donut-w{position:relative;width:120px;height:120px;margin:0 auto 16px}
.donut-w canvas{position:absolute;top:0;left:0}
.dctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.dctr-n{font-family:'DM Serif Display',serif;font-size:19px}
.dctr-s{font-size:10px;color:var(--ink3)}
.ar{display:flex;flex-direction:column;gap:9px}
.ar-row{display:flex;align-items:center;gap:9px}
.ar-sw{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ar-nm{font-size:12px;color:var(--ink2);flex:1}
.ar-vl{font-size:12px;font-weight:600}
.ar-pt{font-size:11px;color:var(--ink3);min-width:30px;text-align:right}
/* TABLE */
.c-table{grid-column:span 4;padding:22px 24px}
table{width:100%;border-collapse:collapse}
thead th{font-size:10px;font-weight:500;letter-spacing:.6px;text-transform:uppercase;color:var(--ink3);padding:0 12px 10px;border-bottom:1px solid var(--rim)}
thead th:not(:first-child){text-align:right}
.tr-cat td{padding:12px 12px 11px;border-bottom:1px solid var(--ink4);cursor:pointer;transition:background .18s}
.tr-cat:hover td{background:var(--glass2)}
.tr-cat td:not(:first-child){text-align:right}
.cat-name{display:flex;align-items:center;gap:11px;font-weight:600;font-size:13.5px}
.cat-chip{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.cat-sub-txt{font-size:11px;color:var(--ink3);font-weight:400;margin-top:1px}
.earrow{margin-left:auto;font-size:11px;color:var(--ink3);transition:transform .22s;display:inline-block}
.expanded .earrow{transform:rotate(90deg)}
.tr-sub{display:none}
.tr-sub.show{display:table-row}
.tr-sub td{padding:7px 12px 7px 55px;border-bottom:1px solid rgba(255,255,255,.03);font-size:12.5px;color:var(--ink2)}
.tr-sub td:not(:first-child){text-align:right}
.sub-nw{display:flex;align-items:center;gap:7px}
.sub-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.td-chg{font-weight:600}
.td-chg.up{color:var(--green)}.td-chg.dn{color:var(--coral)}
.mbar-w{display:inline-flex;align-items:center;gap:7px;justify-content:flex-end}
.mbar{width:48px;height:3px;border-radius:2px;background:var(--glass3);overflow:hidden}
.mfill{height:100%;border-radius:2px}
/* GOAL */
.c-goal{grid-column:span 2;padding:22px 20px}
.g-track{position:relative;height:7px;border-radius:4px;background:var(--glass3);margin:12px 0 8px;overflow:visible}
.g-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue),var(--violet));box-shadow:0 0 9px rgba(79,163,255,.38);transition:width .8s cubic-bezier(.22,1,.36,1);position:relative}
.g-fill::after{content:'';position:absolute;right:-4px;top:-4px;width:15px;height:15px;border-radius:50%;background:var(--blue);box-shadow:0 0 0 3px var(--bg),0 0 9px var(--blue)}
.L .g-fill::after{box-shadow:0 0 0 3px var(--bg3),0 0 9px var(--blue)}
.g-lbls{display:flex;justify-content:space-between;font-size:11px;color:var(--ink3)}
.g-chips{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap}
.gchip{padding:4px 9px;border-radius:7px;font-size:11px;border:1px solid var(--rim);color:var(--ink2)}
.gchip.done{border-color:rgba(62,207,142,.28);color:var(--green);background:var(--green2)}
/* LOG */
.c-log{grid-column:span 2;padding:22px 20px}
.log-scroll{max-height:190px;overflow-y:auto;margin-top:4px}
.log-scroll::-webkit-scrollbar{width:3px}
.log-scroll::-webkit-scrollbar-thumb{background:var(--rim2);border-radius:2px}
.li{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--ink4);font-size:12px}
.li:last-child{border:none}
.ll{width:2px;height:26px;border-radius:1px;flex-shrink:0}
.lm{flex:1;color:var(--ink2);line-height:1.4}
.lt{font-size:10.5px;color:var(--ink3);white-space:nowrap}
/* EMPTY */
.empty-state{grid-column:span 4;padding:60px 24px;text-align:center}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-h{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:8px}
.empty-s{font-size:13px;color:var(--ink2);margin-bottom:24px}
.empty-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(79,163,255,.28),rgba(79,163,255,.13));border:1px solid rgba(79,163,255,.42);border-radius:14px;padding:11px 22px;font-size:13px;font-weight:600;color:var(--blue);cursor:pointer;transition:all .2s}
.empty-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(79,163,255,.2)}
/* MODAL */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.58);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .28s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg3);border:1px solid var(--rim2);border-radius:26px;padding:0;width:560px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;transform:translateY(16px) scale(.985);transition:transform .28s cubic-bezier(.22,1,.36,1);box-shadow:0 40px 80px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.04) inset}
.overlay.open .modal{transform:none}
.m-tabs{display:flex;border-bottom:1px solid var(--rim);padding:0 24px;flex-shrink:0}
.m-tab{padding:16px 14px 14px;font-size:12.5px;font-weight:500;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.m-tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.m-body{padding:24px;overflow-y:auto;flex:1}
.m-body::-webkit-scrollbar{width:3px}
.m-body::-webkit-scrollbar-thumb{background:var(--rim2);border-radius:2px}
.paste-hint{font-size:12px;color:var(--ink2);margin-bottom:10px;line-height:1.7;padding:11px 13px;background:var(--glass);border:1px solid var(--rim);border-radius:10px}
.paste-area{width:100%;min-height:110px;background:var(--glass3);border:1px solid var(--rim);border-radius:var(--r2);padding:13px 15px;font-size:13px;color:var(--ink);font-family:'DM Sans',sans-serif;resize:vertical;outline:none;transition:border-color .2s,box-shadow .2s;line-height:1.7;margin:10px 0 12px}
.paste-area::placeholder{color:var(--ink3)}
.paste-area:focus{border-color:rgba(79,163,255,.45);box-shadow:0 0 0 3px rgba(79,163,255,.09)}
.parse-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:linear-gradient(135deg,rgba(79,163,255,.22),rgba(155,140,255,.15));border:1px solid rgba(79,163,255,.35);border-radius:var(--r2);padding:12px;font-size:13px;font-weight:600;color:var(--blue);cursor:pointer;transition:all .2s;margin-bottom:16px}
.parse-btn:hover{background:linear-gradient(135deg,rgba(79,163,255,.32),rgba(155,140,255,.22));transform:translateY(-1px)}
.parsed-title{font-size:11px;font-weight:500;letter-spacing:.65px;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.parsed-list{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.pi{background:var(--glass);border:1px solid var(--rim);border-radius:var(--r2);padding:11px 14px}
.pi-row{display:flex;align-items:center;gap:10px}
.pi-icon{font-size:16px;flex-shrink:0}
.pi-info{flex:1;min-width:0}
.pi-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-meta{font-size:11px;margin-top:2px;display:flex;align-items:center;gap:6px}
.pi-badge{padding:2px 7px;border-radius:5px;font-size:10.5px;font-weight:600}
.pi-amt{font-family:'DM Serif Display',serif;font-size:15px;white-space:nowrap;margin-right:6px}
.pi-edit{background:var(--glass2);border:1px solid var(--rim);border-radius:7px;padding:4px 8px;font-size:11px;color:var(--ink2);cursor:pointer;transition:all .18s;white-space:nowrap}
.pi-edit:hover{border-color:var(--rim2);color:var(--ink)}
.pi-dd{margin-top:8px;display:none;gap:4px;flex-direction:column}
.pi-dd.open{display:flex}
.pi-opt{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:12.5px;background:var(--glass2);transition:background .15s}
.pi-opt:hover{background:var(--glass3)}
.pi-dd-foot{display:flex;gap:6px;margin-top:4px}
.memory-note{padding:9px 12px;background:var(--glass);border:1px solid var(--rim);border-radius:10px;font-size:11.5px;color:var(--ink2)}
.date-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.fl{font-size:11.5px;color:var(--ink2);font-weight:500}
.fi{background:var(--glass3);border:1px solid var(--rim);border-radius:9px;padding:9px 12px;font-size:13px;color:var(--ink);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
.fi::placeholder{color:var(--ink3)}
.fi:focus{border-color:rgba(79,163,255,.45);box-shadow:0 0 0 3px rgba(79,163,255,.08)}
.fsec{font-size:10px;font-weight:500;letter-spacing:.65px;text-transform:uppercase;color:var(--ink3);margin:14px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--ink4)}
.fi-hint{font-size:11px;color:var(--ink3);margin-top:3px}
.rules-panel{background:var(--glass);border:1px solid var(--rim);border-radius:var(--r2);padding:14px;margin-top:12px}
.rules-title{font-size:11px;font-weight:500;letter-spacing:.6px;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
.rule-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--ink4);font-size:12px}
.rule-row:last-child{border:none}
.rule-kw{flex:1;color:var(--ink2)}
.rule-cat{color:var(--blue);font-size:11.5px}
.rule-del{background:none;border:none;color:var(--ink3);cursor:pointer;font-size:14px;transition:color .2s}
.rule-del:hover{color:var(--coral)}
.m-actions{display:flex;gap:8px;padding:16px 24px;border-top:1px solid var(--rim);flex-shrink:0;background:var(--bg3)}
.btn{padding:11px 16px;border-radius:11px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;border:none}
.btn-g{flex:1;background:var(--glass);border:1px solid var(--rim);color:var(--ink2)}
.btn-g:hover{background:var(--glass2)}

      <div class="date-row">
        <div class="fg" style="margin:0"><label class="fl">年份</label><input class="fi" id="py" type="number" placeholder="2025"></div>

集保 3471828
國泰複委託 USD 24312
元大活存 120,000
房貸 -800000"></textarea>

<script>
/* CONFIG */
const SB_URL='https://awpexkfersmaetzsgoik.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3cGV4a2ZlcnNtYWV0enNnb2lrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjMxMTcsImV4cCI6MjA5NDMzOTExN30.LJzPLYu-evBVH_XCRZfqVMW08Fnr2d9ktmT1yR3r4l8';
const PIN_KEY='nw_pin';
const DEFAULT_PIN='1234';
const GOAL=30000000;
const CATS=[
  {name:'現金 ／ 存款',icon:'💵',color:'#4fa3ff'},
  {name:'台股 ETF',icon:'📈',color:'#3ecf8e'},
  {name:'美股 ETF',icon:'🌐',color:'#9b8cff'},
  {name:'基金',icon:'📊',color:'#f5c842'},
  {name:'加密貨幣',icon:'₿',color:'#f97316'},
  {name:'負債',icon:'🏦',color:'#ff6b6b'},
];
// 內建分類規則
const BUILTIN={
  '集保':'台股 ETF','台股':'台股 ETF','0050':'台股 ETF','0056':'台股 ETF','元大台股':'台股 ETF','富邦台50':'台股 ETF',
  '複委託':'美股 ETF','美股':'美股 ETF','voo':'美股 ETF','qqq':'美股 ETF','spy':'美股 ETF','vt':'美股 ETF',
  '帳戶':'現金 ／ 存款','存款':'現金 ／ 存款','活存':'現金 ／ 存款','現金':'現金 ／ 存款','儲蓄':'現金 ／ 存款','銀行':'現金 ／ 存款',
  '基金':'基金','投信':'基金','野村':'基金','元大基金':'基金',
  'btc':'加密貨幣','eth':'加密貨幣','加密':'加密貨幣','幣安':'加密貨幣','usdt':'加密貨幣',
  '房貸':'負債','貸款':'負債','負債':'負債','信貸':'負債','車貸':'負債',
};
const USD_KW=['usd','美元','美金','複委託','美股','btc','eth','usdt','加密'];

const {createClient}=supabase;
const db=createClient(SB_URL,SB_KEY);
let FX=32.0,curMode='twd',light=false,allExpanded=false;
let currentMonth=null,currentData=null,parsedItems=[],activeTab=0;
let userRules={},tChart=null,dChart=null;

/* PIN */
let pin='';
const getPin=()=>localStorage.getItem(PIN_KEY)||DEFAULT_PIN;
function np(d){if(pin.length>=4)return;pin+=d;updDots();if(pin.length===4)setTimeout(npS,130);}
function npD(){pin=pin.slice(0,-1);updDots();}
function updDots(err){for(let i=0;i<4;i++){const e=document.getElementById('p'+i);e.className='pd'+(i<pin.length?' on':'')+(err?' err':'');}}
function npS(){
  if(pin===getPin()){
    const ls=document.getElementById('loginScreen');ls.style.opacity='0';ls.style.pointerEvents='none';
    setTimeout(()=>{ls.style.display='none';initApp();},500);
  }else{updDots(true);document.getElementById('lcErr').textContent='PIN 碼錯誤';setTimeout(()=>{pin='';updDots();document.getElementById('lcErr').textContent='';},800);}
}
document.addEventListener('keydown',e=>{
  const ls=document.getElementById('loginScreen');
  if(!ls||ls.style.display==='none'||ls.style.opacity==='0')return;
  if(e.key>='0'&&e.key<='9')np(e.key);
  if(e.key==='Backspace')npD();
  if(e.key==='Enter')npS();
});

/* INIT */
async function initApp(){
  showLoading('載入資料中…');
  document.getElementById('app').style.display='block';
  await Promise.all([fetchFX(),loadRules()]);
  await loadAvailableMonths();
  hideLoading();
}

/* FX */
async function fetchFX(){
  try{const r=await fetch('https://open.er-api.com/v6/latest/USD');const d=await r.json();if(d.rates?.TWD)FX=d.rates.TWD;}catch(e){FX=32.0;}
  document.getElementById('rLbl').textContent=`1 USD = ${FX.toFixed(2)} TWD（即時）`;
}

/* RULES */
async function loadRules(){
  const{data}=await db.from('classification_rules').select('*');
  userRules={};
  if(data)data.forEach(r=>{userRules[r.keyword.toLowerCase()]={category:r.category,currency:r.currency};});
}
function allRules(){
  const m={};
  Object.entries(BUILTIN).forEach(([k,v])=>m[k]={category:v,currency:USD_KW.includes(k)?'USD':'TWD'});
  Object.entries(userRules).forEach(([k,v])=>m[k]=v);
  return m;
}
function classify(name,raw=''){
  const rules=allRules();
  const ln=name.toLowerCase(),lr=raw.toLowerCase();
  for(const[kw,rule]of Object.entries(rules)){if(ln.includes(kw)||lr.includes(kw))return rule;}
  const isUSD=USD_KW.some(k=>ln.includes(k)||lr.includes(k));
  return{category:'現金 ／ 存款',currency:isUSD?'USD':'TWD'};
}
async function saveRule(kw,cat,cur){
  const k=kw.toLowerCase().trim();if(!k)return;
  await db.from('classification_rules').upsert({keyword:k,category:cat,currency:cur},{onConflict:'keyword'});
  userRules[k]={category:cat,currency:cur};
  await addLog('規則',`「${k}」→ ${cat}`);
}
async function deleteRule(kw){
  await db.from('classification_rules').delete().eq('keyword',kw);
  delete userRules[kw];renderRulesList();showToast('已刪除規則');
}
async function addRule(){
  const kw=document.getElementById('newKw').value.trim();
  const cat=document.getElementById('newCat').value;
  const cur=document.getElementById('newCur').value;
  if(!kw){showToast('請輸入關鍵字','err');return;}
  await saveRule(kw,cat,cur);
  document.getElementById('newKw').value='';
  renderRulesList();showToast(`✓ 已新增：「${kw}」→ ${cat}`);
}
function renderRulesList(){
  const el=document.getElementById('rulesList');if(!el)return;
  const entries=Object.entries(userRules);
  if(!entries.length){el.innerHTML='<div style="color:var(--ink3);font-size:12px;padding:4px 0">尚無自訂規則</div>';return;}
  el.innerHTML=entries.map(([kw,r])=>`<div class="rule-row"><div class="rule-kw">${kw}</div><div class="rule-cat">${r.category} · ${r.currency}</div><button class="rule-del" onclick="deleteRule('${kw}')">✕</button></div>`).join('');
}

/* PARSE */
function runParse(){
  const txt=document.getElementById('pasteArea').value.trim();
  if(!txt){showToast('請先貼上資產文字','err');return;}
  const segs=txt.split(/[,，、;\n]+/).map(s=>s.trim()).filter(Boolean);
  parsedItems=[];
  segs.forEach(seg=>{
    const numMatch=seg.match(/-?[\d,]+\.?\d*/);
    if(!numMatch)return;
    const amt=parseFloat(numMatch[0].replace(/,/g,''));
    if(isNaN(amt)||amt===0)return;
    const name=seg.replace(/-?[\d,]+\.?\d*/g,'').replace(/USD|TWD|美元|美金/gi,'').replace(/[（()【】\[\]]/g,' ').trim()||seg.slice(0,12);
    const forceUSD=/USD|美元|美金/i.test(seg);
    const isDebt=amt<0||/負債|貸款|房貸|信貸|車貸/i.test(seg);
    let{category,currency}=classify(name,seg);
    if(forceUSD)currency='USD';
    if(isDebt){category='負債';currency='TWD';}
    parsedItems.push({name,amt:Math.abs(amt),category,currency});
  });
  if(!parsedItems.length){showToast('未能辨識任何項目，請確認格式','err');return;}
  renderParsed();
  document.getElementById('parsedSection').style.display='block';
  document.getElementById('parsedCount').textContent=`✓ ${parsedItems.length} 筆`;
}
function renderParsed(){
  const list=document.getElementById('parsedList');list.innerHTML='';
  parsedItems.forEach((item,i)=>{
    const cat=CATS.find(c=>c.name===item.category)||CATS[0];
    const div=document.createElement('div');div.className='pi';div.id=`pi${i}`;
    div.innerHTML=`
      <div class="pi-row">
        <div class="pi-icon">${cat.icon}</div>
        <div class="pi-info">
          <div class="pi-name">${item.name}</div>
          <div class="pi-meta">
            <span class="pi-badge" style="background:${cat.color}22;color:${cat.color}">${item.category}</span>
            <span style="color:var(--ink3)">${item.currency}</span>
          </div>
        </div>
        <div class="pi-amt">$${item.amt.toLocaleString()}</div>
        <button class="pi-edit" onclick="toggleDD(${i})">改分類</button>
      </div>
      <div class="pi-dd" id="dd${i}">
        ${CATS.map(c=>`<div class="pi-opt" onclick="setCat(${i},'${c.name}','${c.icon}','${c.color}')"><span>${c.icon}</span><span style="color:${c.color}">${c.name}</span></div>`).join('')}
        <div class="pi-dd-foot">
          <select id="cur${i}" style="flex:1;background:var(--glass3);border:1px solid var(--rim);border-radius:7px;padding:5px 8px;font-size:12px;color:var(--ink);font-family:'DM Sans',sans-serif;outline:none">
            <option ${item.currency==='TWD'?'selected':''}>TWD</option>
            <option ${item.currency==='USD'?'selected':''}>USD</option>
          </select>
          <button class="pi-edit" style="flex:2" onclick="confirmEdit(${i})">✓ 確認並記憶此規則</button>
        </div>
      </div>`;
    list.appendChild(div);
  });
}
function toggleDD(i){document.getElementById('dd'+i).classList.toggle('open');}
function setCat(i,catName,icon,color){
  parsedItems[i].category=catName;
  const pi=document.getElementById('pi'+i);
  pi.querySelector('.pi-icon').textContent=icon;
  const b=pi.querySelector('.pi-badge');b.textContent=catName;b.style.background=color+'22';b.style.color=color;
}
async function confirmEdit(i){
  const cur=document.getElementById('cur'+i).value;
  parsedItems[i].currency=cur;
  const kw=parsedItems[i].name.toLowerCase().replace(/\s+/g,'').slice(0,12);
  await saveRule(kw,parsedItems[i].category,cur);
  document.getElementById('dd'+i).classList.remove('open');
  showToast(`✓ 已記憶：「${parsedItems[i].name}」→ ${parsedItems[i].category}`);
}

/* DATA */
async function loadAvailableMonths(){
  const{data}=await db.from('monthly_records').select('id,year,month').order('year',{ascending:false}).order('month',{ascending:false});
  const months=data||[];
  if(months.length>0){currentMonth={year:months[0].year,month:months[0].month};await loadMonthData();}
  else{currentMonth={year:new Date().getFullYear(),month:new Date().getMonth()+1};updateMonthLabel();renderEmpty();}
}
async function loadMonthData(){
  showLoading('載入資料中…');updateMonthLabel();
  const{data:rec}=await db.from('monthly_records').select('*').eq('year',currentMonth.year).eq('month',currentMonth.month).maybeSingle();
  if(!rec){currentData=null;renderEmpty();hideLoading();return;}
  const{data:items}=await db.from('asset_items').select('*').eq('record_id',rec.id).order('category');
  let py=currentMonth.year,pm=currentMonth.month-1;
  if(pm<1){pm=12;py--;}
  const{data:pr}=await db.from('monthly_records').select('*').eq('year',py).eq('month',pm).maybeSingle();
  let prevItems=[];
  if(pr){const{data:pi}=await db.from('asset_items').select('*').eq('record_id',pr.id);prevItems=pi||[];}
  currentData={record:rec,items:items||[],prevItems,prevRecord:pr};
  renderDashboard();hideLoading();
}

/* EMPTY */
function renderEmpty(){
  document.getElementById('mainGrid').innerHTML=`<div class="card empty-state"><div class="empty-icon">📊</div><div class="empty-h">${currentMonth.year} 年 ${currentMonth.month} 月尚無記錄</div><div class="empty-s">貼上資產數字或手動輸入，開始追蹤你的財富</div><button class="empty-btn" onclick="openModal()">＋ 新增本月記錄</button></div>`;
  if(tChart){tChart.destroy();tChart=null;}if(dChart){dChart.destroy();dChart=null;}
}

/* DASHBOARD */
function renderDashboard(){
  const{items,prevItems=[],prevRecord}=currentData;
  const ct={},cs={};CATS.forEach(c=>{ct[c.name]=0;cs[c.name]=[];});
  items.forEach(it=>{if(ct[it.category]===undefined){ct[it.category]=0;cs[it.category]=[];}ct[it.category]+=it.amount_twd;cs[it.category].push(it);});
  const pct={};CATS.forEach(c=>pct[c.name]=0);
  prevItems.forEach(it=>{if(pct[it.category]!==undefined)pct[it.category]+=it.amount_twd;});
  const assets=items.filter(i=>i.category!=='負債').reduce((s,i)=>s+i.amount_twd,0);
  const debt=items.filter(i=>i.category==='負債').reduce((s,i)=>s+i.amount_twd,0);
  const net=assets-debt;
  const pa=prevItems.filter(i=>i.category!=='負債').reduce((s,i)=>s+i.amount_twd,0);
  const pd2=prevItems.filter(i=>i.category==='負債').reduce((s,i)=>s+i.amount_twd,0);
  const pnet=pa-pd2,hasPrev=!!prevRecord;
  const fmt=n=>curMode==='usd'?'USD '+Math.round(n/FX).toLocaleString():'$'+Math.round(n).toLocaleString();
  const netChg=hasPrev?net-pnet:null;
  const netPct=hasPrev&&pnet?((netChg/pnet)*100).toFixed(1):null;
  const goalPct=Math.min(100,net/GOAL*100);
  const badge=netChg!==null?`<div class="h-badge ${netChg>=0?'up':'dn'}">${netChg>=0?'▲':'▼'} ${Math.abs(Math.round(netChg)).toLocaleString()} ／ ${netChg>=0?'+':''}${netPct}% 本月</div>`:'<div class="h-badge up">首筆記錄</div>';
  const ac=hasPrev?assets-pa:null,dc=hasPrev?debt-pd2:null;
  document.getElementById('mainGrid').innerHTML=`
    <div class="card c-hero">
      <div class="h-lbl">本月淨資產</div><div class="h-val">${fmt(net)}</div>
      <div class="h-sub">${curMode==='twd'?'≈ USD '+Math.round(net/FX).toLocaleString():'≈ TWD '+Math.round(net).toLocaleString()}</div>${badge}
    </div>
    <div class="card c-stat">
      <div class="s-lbl"><div class="s-ico" style="background:rgba(79,163,255,.15)">📦</div>總資產</div>
      <div class="s-num">${fmt(assets)}</div>
      ${ac!==null?`<div class="s-chg ${ac>=0?'up':'dn'}">${ac>=0?'▲':'▼'} ${Math.abs(Math.round(ac)).toLocaleString()}</div>`:'<div class="s-chg up">首筆</div>'}
    </div>
    <div class="card c-stat">
      <div class="s-lbl"><div class="s-ico" style="background:rgba(255,107,107,.15)">📉</div>負債</div>
      <div class="s-num" style="color:var(--coral)">${fmt(debt)}</div>
      ${dc!==null?`<div class="s-chg ${dc<=0?'up':'dn'}">${dc<=0?'▼ 減少 ':'▲ 增加 '}${Math.abs(Math.round(dc)).toLocaleString()}</div>`:'<div class="s-chg up">首筆</div>'}
    </div>
    <div class="card c-trend"><div class="c-title"><span>淨資產趨勢</span></div><canvas id="tChart" height="155"></canvas></div>
    <div class="card c-alloc">
      <div class="c-title">配置比例</div>
      <div class="donut-w"><canvas id="dChart" width="120" height="120"></canvas><div class="dctr"><div class="dctr-n">${Object.values(ct).filter(v=>v>0).length}</div><div class="dctr-s">類別</div></div></div>
      <div class="ar" id="arRows"></div>
    </div>
    <div class="card c-table">
      <div class="c-title" style="margin-bottom:14px"><span>各類資產明細</span><span style="font-size:10.5px;color:var(--blue);cursor:pointer" onclick="toggleAll()">全部展開 ↕</span></div>
      <table><thead><tr><th style="text-align:left">類別 ／ 子項目</th><th>本月</th><th>上月</th><th>變化</th><th>佔比</th></tr></thead><tbody id="aTbody"></tbody></table>
    </div>
    <div class="card c-goal">
      <div class="c-title">退休目標進度</div>
      <div style="font-size:12px;color:var(--ink2);margin-top:3px">目標：TWD 30,000,000 ／ 50 歲前</div>
      <div class="g-track"><div class="g-fill" style="width:${goalPct.toFixed(1)}%"></div></div>
      <div class="g-lbls"><span>$0</span><span style="color:var(--blue);font-weight:600">${goalPct.toFixed(1)}% — $${(net/10000).toFixed(0)}萬</span><span>$3000萬</span></div>
      <div class="g-chips">
        <div class="gchip ${net>=5000000?'done':''}">500萬</div>
        <div class="gchip ${net>=10000000?'done':''}">1000萬</div>
        <div class="gchip ${net>=15000000?'done':''}">1500萬</div>
        <div class="gchip ${net>=20000000?'done':''}">2000萬</div>
        <div class="gchip ${net>=30000000?'done':''}">3000萬</div>
      </div>
    </div>
    <div class="card c-log"><div class="c-title">操作記錄</div><div class="log-scroll" id="logList"><div style="color:var(--ink3);font-size:12px">載入中…</div></div></div>`;
  // alloc rows
  const ar=document.getElementById('arRows');
  CATS.filter(c=>ct[c.name]>0).forEach(c=>{
    const p=(ct[c.name]/assets*100).toFixed(1);
    ar.innerHTML+=`<div class="ar-row"><div class="ar-sw" style="background:${c.color}"></div><div class="ar-nm">${c.name}</div><div class="ar-vl" style="color:${c.color}">$${(ct[c.name]/10000).toFixed(0)}萬</div><div class="ar-pt">${p}%</div></div>`;
  });
  renderTable(ct,cs,pct,assets);
  buildTrendChart();buildDonutChart(ct,assets);loadLog();
}

/* TABLE */
function renderTable(ct,cs,pct,total){
  const tb=document.getElementById('aTbody');if(!tb)return;tb.innerHTML='';
  CATS.forEach((c,ci)=>{
    const cur=ct[c.name]||0,prev=pct[c.name]||0,subs=cs[c.name]||[];
    if(cur===0&&!subs.length)return;
    const chg=cur-prev,p=total>0?(cur/total*100).toFixed(1):'0.0';
    const tr=document.createElement('tr');tr.className='tr-cat';tr.id='cat'+ci;
    tr.innerHTML=`<td><div class="cat-name"><div class="cat-chip" style="background:${c.color}1a">${c.icon}</div><div><div>${c.name}</div><div class="cat-sub-txt">${subs.length} 個子項目</div></div><span class="earrow">›</span></div></td><td>$${Math.round(cur).toLocaleString()}</td><td style="color:var(--ink3)">$${Math.round(prev).toLocaleString()}</td><td class="td-chg ${chg>=0?'up':'dn'}">${chg>=0?'▲':'▼'} ${Math.abs(Math.round(chg)).toLocaleString()}</td><td><div class="mbar-w"><div class="mbar"><div class="mfill" style="width:${p}%;background:${c.color}"></div></div><span style="font-size:11.5px;color:var(--ink2)">${p}%</span></div></td>`;
    tr.onclick=()=>toggleCat(ci,subs.length);tb.appendChild(tr);
    subs.forEach((s,si)=>{
      const tr2=document.createElement('tr');tr2.className='tr-sub';tr2.id=`sub${ci}_${si}`;
      tr2.innerHTML=`<td><div class="sub-nw"><div class="sub-dot" style="background:${c.color}99"></div>${s.name}</div></td><td>$${Math.round(s.amount_twd).toLocaleString()}</td><td style="color:var(--ink3)">${s.currency==='USD'?'USD '+Number(s.amount_original).toLocaleString():'$'+Number(s.amount_original).toLocaleString()}</td><td style="color:var(--ink3)">—</td><td style="color:var(--ink3);font-size:11.5px">${total>0?(s.amount_twd/total*100).toFixed(1):'0.0'}%</td>`;
      tb.appendChild(tr2);
    });
  });
}
function toggleCat(ci,n){const c=document.getElementById('cat'+ci);if(!c)return;const ex=c.classList.toggle('expanded');for(let i=0;i<n;i++){const s=document.getElementById(`sub${ci}_${i}`);if(s)s.classList.toggle('show',ex);}}
function toggleAll(){allExpanded=!allExpanded;document.querySelectorAll('.tr-cat').forEach(c=>c.classList.toggle('expanded',allExpanded));document.querySelectorAll('.tr-sub').forEach(s=>s.classList.toggle('show',allExpanded));document.querySelector('[onclick="toggleAll()"]').textContent=allExpanded?'全部收合 ↕':'全部展開 ↕';}

/* CHARTS */
async function buildTrendChart(){
  if(tChart){tChart.destroy();tChart=null;}
  const{data:recs}=await db.from('monthly_records').select('id,year,month').order('year').order('month').limit(24);
  if(!recs?.length)return;
  const labels=[],values=[];
  for(const rec of recs){
    const{data:its}=await db.from('asset_items').select('amount_twd,category').eq('record_id',rec.id);
    if(!its)continue;
    const n=its.filter(i=>i.category!=='負債').reduce((s,i)=>s+i.amount_twd,0)-its.filter(i=>i.category==='負債').reduce((s,i)=>s+i.amount_twd,0);
    labels.push(`${rec.year}/${rec.month}`);values.push(n);
  }
  const ctx=document.getElementById('tChart');if(!ctx)return;
  const c=ctx.getContext('2d');const g=c.createLinearGradient(0,0,0,180);g.addColorStop(0,'rgba(79,163,255,.2)');g.addColorStop(1,'rgba(79,163,255,0)');
  tChart=new Chart(ctx,{type:'line',data:{labels,datasets:[{data:values,borderColor:'#4fa3ff',backgroundColor:g,borderWidth:2,pointRadius:4,pointBackgroundColor:'#4fa3ff',tension:.4,fill:true}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(13,13,24,.9)',borderColor:'rgba(79,163,255,.3)',borderWidth:1,callbacks:{label:c=>' $'+Math.round(c.raw).toLocaleString()}}},scales:{x:{grid:{color:gc()},ticks:{color:tc(),font:{size:11,family:'DM Sans'}}},y:{grid:{color:gc()},ticks:{color:tc(),font:{size:11,family:'DM Sans'},callback:v=>'$'+(v/1e6).toFixed(1)+'M'}}}}});
}
function buildDonutChart(ct,total){
  if(dChart){dChart.destroy();dChart=null;}
  const dc=document.getElementById('dChart');if(!dc)return;
  const pos=CATS.filter(c=>ct[c.name]>0&&c.name!=='負債');
  dChart=new Chart(dc,{type:'doughnut',data:{labels:pos.map(c=>c.name),datasets:[{data:pos.map(c=>ct[c.name]),backgroundColor:pos.map(c=>c.color+'cc'),borderWidth:0,hoverOffset:5}]},options:{responsive:false,cutout:'67%',plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(13,13,24,.9)',callbacks:{label:c=>' $'+Math.round(c.raw).toLocaleString()}}}}});
}
const gc=()=>light?'rgba(22,22,30,.07)':'rgba(255,255,255,.07)';
const tc=()=>light?'rgba(22,22,30,.35)':'rgba(238,238,245,.35)';

/* LOG */
async function loadLog(){
  const ll=document.getElementById('logList');if(!ll)return;
  const{data}=await db.from('activity_log').select('*').order('created_at',{ascending:false}).limit(20);
  if(!data?.length){ll.innerHTML='<div style="color:var(--ink3);font-size:12px;padding:8px 0">尚無記錄</div>';return;}
  const colors={'新增':'var(--green)','修改':'var(--blue)','規則':'var(--violet)','刪除':'var(--coral)'};
  ll.innerHTML=data.map(l=>{
    const color=Object.entries(colors).find(([k])=>l.action.includes(k))?.[1]||'var(--ink3)';
    const dt=new Date(l.created_at);
    const ts=`${(dt.getMonth()+1).toString().padStart(2,'0')}-${dt.getDate().toString().padStart(2,'0')} ${dt.getHours().toString().padStart(2,'0')}:${dt.getMinutes().toString().padStart(2,'0')}`;
    return `<div class="li"><div class="ll" style="background:${color}"></div><div class="lm">${l.action}${l.detail?'：'+l.detail:''}</div><div class="lt">${ts}</div></div>`;
  }).join('');
}
async function addLog(action,detail=''){await db.from('activity_log').insert({action,detail});}

/* MONTH NAV */
function updateMonthLabel(){document.getElementById('mLbl').textContent=`${currentMonth.year} 年 ${currentMonth.month} 月`;}
async function shiftMonth(d){let{year,month}=currentMonth;month+=d;if(month>12){month=1;year++;}if(month<1){month=12;year--;}currentMonth={year,month};await loadMonthData();}

/* CURRENCY / THEME */
function setCur(m,b){curMode=m;document.querySelectorAll('.cpill').forEach(x=>x.classList.remove('on'));b.classList.add('on');if(currentData)renderDashboard();}
function toggleTheme(){light=!light;document.body.classList.toggle('L',light);document.getElementById('thBtn').textContent=light?'☀️ 淺色':'🌙 深色';if(tChart){tChart.options.scales.x.grid.color=gc();tChart.options.scales.y.grid.color=gc();tChart.options.scales.x.ticks.color=tc();tChart.options.scales.y.ticks.color=tc();tChart.update();}}

/* MODAL */
function openModal(){
  const now=new Date();const y=now.getFullYear(),m=now.getMonth()+1;
  ['py','pm','my','mm'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=id.endsWith('y')?y:m;});
  parsedItems=[];document.getElementById('parsedSection').style.display='none';document.getElementById('pasteArea').value='';
  document.getElementById('ov').classList.add('open');
}
function closeModal(){document.getElementById('ov').classList.remove('open');}
function switchTab(i,el){
  ['tab0','tab1','tab2'].forEach((id,j)=>{const t=document.getElementById(id);if(t)t.style.display=j===i?'block':'none';});
  document.querySelectorAll('.m-tab').forEach((t,j)=>t.classList.toggle('on',j===i));
  activeTab=i;if(i===2)renderRulesList();
}

/* SAVE */
async function saveRecord(){
  const btn=document.getElementById('saveBtn');btn.disabled=true;btn.textContent='儲存中…';
  let year,month,rows=[];
  if(activeTab===0){
    year=parseInt(document.getElementById('py').value);month=parseInt(document.getElementById('pm').value);
    if(!parsedItems.length){showToast('請先解析資產文字','err');btn.disabled=false;btn.textContent='儲存記錄';return;}
    rows=parsedItems.map(it=>({name:it.name,category:it.category,amount_original:it.amt,currency:it.currency,amount_twd:it.currency==='USD'?Math.round(it.amt*FX):it.amt}));
  }else if(activeTab===1){
    year=parseInt(document.getElementById('my').value);month=parseInt(document.getElementById('mm').value);
    const fields=[{id:'m-cash',cat:'現金 ／ 存款',cur:'TWD',name:'現金存款'},{id:'m-tw',cat:'台股 ETF',cur:'TWD',name:'台股 ETF'},{id:'m-fund',cat:'基金',cur:'TWD',name:'基金'},{id:'m-us',cat:'美股 ETF',cur:'USD',name:'美股 ETF'},{id:'m-crypto',cat:'加密貨幣',cur:'USD',name:'加密貨幣'},{id:'m-debt',cat:'負債',cur:'TWD',name:'負債'}];
    fields.forEach(f=>{const v=parseFloat(document.getElementById(f.id)?.value)||0;if(v>0)rows.push({name:f.name,category:f.cat,amount_original:v,currency:f.cur,amount_twd:f.cur==='USD'?Math.round(v*FX):v});});
    if(!rows.length){showToast('請至少輸入一個項目','err');btn.disabled=false;btn.textContent='儲存記錄';return;}
  }else{btn.disabled=false;btn.textContent='儲存記錄';return;}
  if(!year||!month||year<2000||month<1||month>12){showToast('請填入正確的年份和月份','err');btn.disabled=false;btn.textContent='儲存記錄';return;}
  try{
    const{data:rec,error:re}=await db.from('monthly_records').upsert({year,month,usd_rate:FX,notes:document.getElementById('m-note')?.value||''},{onConflict:'year,month'}).select().single();
    if(re)throw re;
    await db.from('asset_items').delete().eq('record_id',rec.id);
    const{error:ie}=await db.from('asset_items').insert(rows.map(r=>({...r,record_id:rec.id})));
    if(ie)throw ie;
    await addLog('新增',`${year}/${month} 月份記錄（${rows.length} 筆）`);
    closeModal();showToast(`✓ ${year} 年 ${month} 月記錄已儲存`);
    currentMonth={year,month};await loadAvailableMonths();
  }catch(e){showToast('儲存失敗：'+e.message,'err');}
  btn.disabled=false;btn.textContent='儲存記錄';
}

/* UTILS */
function showLoading(t=''){const s=document.getElementById('loadingScreen');s.style.display='flex';if(t)document.getElementById('loadTxt').textContent=t;}
function hideLoading(){document.getElementById('loadingScreen').style.display='none';}
let toastT;
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(type==='err'?' err':'');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3000);}
</script>
