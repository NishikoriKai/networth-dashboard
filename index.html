<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資產儀表板</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#080810;--bg2:#0d0d18;--bg3:#12121f;--glass:rgba(255,255,255,.043);--glass2:rgba(255,255,255,.072);--glass3:rgba(255,255,255,.10);--rim:rgba(255,255,255,.08);--rim2:rgba(255,255,255,.14);--ink:#eeeef5;--ink2:rgba(238,238,245,.52);--ink3:rgba(238,238,245,.28);--ink4:rgba(238,238,245,.10);--blue:#4fa3ff;--blue3:rgba(79,163,255,.10);--violet:#9b8cff;--teal:#36d9b8;--coral:#ff6b6b;--green:#3ecf8e;--green2:rgba(62,207,142,.13);--red2:rgba(255,107,107,.13);--r:20px;--r2:14px}
.L{--bg:#f0f0f7;--bg2:#e8e8f2;--bg3:#fff;--glass:rgba(255,255,255,.72);--glass2:rgba(255,255,255,.88);--glass3:rgba(0,0,0,.05);--rim:rgba(0,0,0,.07);--rim2:rgba(0,0,0,.12);--ink:#16161e;--ink2:rgba(22,22,30,.52);--ink3:rgba(22,22,30,.28);--ink4:rgba(22,22,30,.08);--blue3:rgba(60,140,255,.07);--green2:rgba(30,160,100,.10);--red2:rgba(200,50,50,.10)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;transition:background .35s,color .35s}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 40% at 18% 8%,rgba(79,163,255,.07),transparent 68%),radial-gradient(ellipse 45% 35% at 82% 82%,rgba(155,140,255,.055),transparent 68%);z-index:0}
body>*{position:relative;z-index:1}

/* LOGIN */
#loginScreen{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:opacity .5s}
.lc{background:var(--glass);border:1px solid var(--rim2);border-radius:28px;padding:44px 36px 36px;text-align:center;backdrop-filter:blur(24px);box-shadow:0 0 0 1px rgba(255,255,255,.04) inset,0 32px 64px rgba(0,0,0,.45);width:330px;animation:lup .7s cubic-bezier(.22,1,.36,1) both}
@keyframes lup{from{opacity:0;transform:translateY(22px) scale(.97)}to{opacity:1;transform:none}}
.lc-icon{width:60px;height:60px;background:linear-gradient(145deg,#1a2a4a,#0d1a33);border:1px solid rgba(79,163,255,.35);border-radius:17px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(79,163,255,.18),inset 0 1px 0 rgba(255,255,255,.10)}
.lc-icon svg{width:26px;height:26px}
.lc-h{font-family:'DM Serif Display',serif;font-size:21px;margin-bottom:4px}
.lc-s{font-size:12.5px;color:var(--ink2);margin-bottom:28px;font-weight:300}
.pin-row{display:flex;gap:12px;justify-content:center;margin-bottom:26px}
.pd{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--rim2);transition:all .16s}
.pd.on{background:var(--blue);border-color:var(--blue);box-shadow:0 0 7px var(--blue);transform:scale(1.1)}
.pd.err{background:var(--coral);border-color:var(--coral);animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}60%{transform:translateX(5px)}}
.np{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.nb{background:var(--glass);border:1px solid var(--rim);border-radius:13px;padding:14px 8px;font-family:'DM Serif Display',serif;font-size:21px;color:var(--ink);cursor:pointer;transition:all .13s;user-select:none}
.nb:hover{background:var(--glass2);border-color:var(--rim2);transform:scale(.97)}
.nb:active{transform:scale(.91)}
.nb.sm{grid-column:span 2;font-family:'DM Sans',sans-serif;font-size:12.5px;color:var(--ink2);font-weight:500}
.nb.ok{background:linear-gradient(135deg,rgba(79,163,255,.25),rgba(79,163,255,.12));border-color:rgba(79,163,255,.4);color:var(--blue);font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:600}
.lc-err{font-size:12px;color:var(--coral);margin-top:10px;min-height:18px}

/* LOADING */
#loadingScreen{position:fixed;inset:0;z-index:150;display:none;align-items:center;justify-content:center;background:var(--bg);flex-direction:column;gap:16px}
.spinner{width:36px;height:36px;border:2px solid var(--rim2);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--ink2)}

/* APP */
#app{display:none}
.topbar{display:flex;align-items:center;padding:0 26px;height:56px;background:rgba(8,8,16,.75);border-bottom:1px solid var(--rim);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50}
.L .topbar{background:rgba(240,240,247,.82)}
.brand{font-family:'DM Serif Display',serif;font-size:16px;letter-spacing:-.2px;display:flex;align-items:center;gap:8px}
.bdot{width:7px;height:7px;border-radius:50%;background:var(--blue);box-shadow:0 0 7px var(--blue)}
.tc{flex:1;display:flex;justify-content:center}
.mnav{display:flex;align-items:center;gap:10px;background:var(--glass);border:1px solid var(--rim);border-radius:22px;padding:5px 14px;font-size:12.5px;font-weight:500}
.mnav button{background:none;border:none;color:var(--ink2);cursor:pointer;font-size:15px;transition:color .2s}
.mnav button:hover{color:var(--ink)}
.mnav span{min-width:84px;text-align:center}
.tr2{display:flex;gap:7px;align-items:center}
.tbtn{background:var(--glass);border:1px solid var(--rim);border-radius:19px;padding:5px 13px;font-size:12px;font-weight:500;color:var(--ink2);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px}
.tbtn:hover{background:var(--glass2);border-color:var(--rim2);color:var(--ink)}
.tbtn.pri{background:linear-gradient(135deg,rgba(79,163,255,.28),rgba(79,163,255,.13));border-color:rgba(79,163,255,.42);color:var(--blue)}
.tbtn.pri:hover{background:linear-gradient(135deg,rgba(79,163,255,.38),rgba(79,163,255,.22))}
.cstrip{display:flex;align-items:center;gap:6px;padding:13px 26px 0}
.cpill{padding:4px 13px;border-radius:15px;font-size:11.5px;font-weight:500;border:1px solid var(--rim);color:var(--ink2);background:transparent;cursor:pointer;transition:all .2s}
.cpill.on{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 0 10px rgba(79,163,255,.28)}
.rbadge{margin-left:auto;font-size:11px;color:var(--ink3);display:flex;align-items:center;gap:5px}
.rdot{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* GRID */
main{padding:18px 26px 48px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:1200px;margin:0 auto}
.card{background:var(--glass);border:1px solid var(--rim);border-radius:var(--r);backdrop-filter:blur(20px);position:relative;overflow:hidden;transition:border-color .22s;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,var(--rim2) 50%,transparent 95%);pointer-events:none}
.card:hover{border-color:var(--rim2)}
.card:nth-child(1){animation-delay:.05s}.card:nth-child(2){animation-delay:.09s}.card:nth-child(3){animation-delay:.12s}.card:nth-child(4){animation-delay:.15s}.card:nth-child(5){animation-delay:.18s}.card:nth-child(6){animation-delay:.21s}.card:nth-child(7){animation-delay:.24s}.card:nth-child(8){animation-delay:.27s}.card:nth-child(9){animation-delay:.30s}

/* HERO */
.c-hero{grid-column:span 2;padding:26px 28px 22px;background:linear-gradient(145deg,rgba(79,163,255,.07),transparent 55%),var(--glass);border-color:rgba(79,163,255,.18)}
.c-hero::after{content:'';position:absolute;bottom:0;right:0;width:160px;height:160px;background:radial-gradient(circle,rgba(79,163,255,.07),transparent 70%);pointer-events:none}
.h-lbl{font-size:11px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;color:var(--ink3);margin-bottom:9px}
.h-val{font-family:'DM Serif Display',serif;font-size:44px;letter-spacing:-2px;line-height:1;margin-bottom:5px;background:linear-gradient(135deg,#eeeef5,#8ab8f0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.L .h-val{background:linear-gradient(135deg,#16161e,#2a5a9a);-webkit-background-clip:text;background-clip:text}
.h-sub{font-size:12.5px;color:var(--ink2);margin-bottom:16px}
.h-badge{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:9px;font-size:12.5px;font-weight:600}
.up{background:var(--green2);color:var(--green);border:1px solid rgba(62,207,142,.18)}
.dn{background:var(--red2);color:var(--coral);border:1px solid rgba(255,107,107,.18)}
.c-stat{padding:20px 20px 18px}
.s-lbl{font-size:10.5px;font-weight:500;letter-spacing:.7px;text-transform:uppercase;color:var(--ink3);margin-bottom:9px;display:flex;align-items:center;gap:6px}
.s-ico{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px}
.s-num{font-family:'DM Serif Display',serif;font-size:26px;letter-spacing:-1px;line-height:1;margin-bottom:7px}
.s-chg{display:inline-flex;align-items:center;gap:3px;font-size:11.5px;font-weight:600;padding:3px 7px;border-radius:6px}

/* TREND */
.c-trend{grid-column:span 3;padding:22px 24px 18px}
.c-title{font-size:11px;font-weight:500;letter-spacing:.65px;text-transform:uppercase;color:var(--ink3);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}

/* RANGE SLIDER */
.range-wrap{margin-top:14px;padding-top:12px;border-top:1px solid var(--ink4)}
.range-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--ink3);margin-bottom:6px}
.range-labels span{color:var(--blue);font-weight:600}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--glass3);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--blue);box-shadow:0 0 0 3px var(--bg),0 0 8px rgba(79,163,255,.5);cursor:pointer;transition:transform .15s}
.L input[type=range]::-webkit-slider-thumb{box-shadow:0 0 0 3px var(--bg3),0 0 8px rgba(79,163,255,.5)}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2)}
input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:2px}

/* ALLOC */
.c-alloc{padding:22px 20px}
.donut-w{position:relative;width:120px;height:120px;margin:0 auto 16px}
.donut-w canvas{position:absolute;top:0;left:0;cursor:pointer}
.dctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.dctr-n{font-family:'DM Serif Display',serif;font-size:19px}
.dctr-s{font-size:10px;color:var(--ink3)}
.ar{display:flex;flex-direction:column;gap:9px}
.ar-row{display:flex;align-items:center;gap:9px;cursor:pointer;border-radius:8px;padding:3px 4px;transition:background .15s}
.ar-row:hover{background:var(--glass2)}
.ar-row.hl{background:var(--glass2);outline:1px solid var(--rim2)}
.ar-sw{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ar-nm{font-size:12px;color:var(--ink2);flex:1}
.ar-vl{font-size:12px;font-weight:600}
.ar-pt{font-size:11px;color:var(--ink3);min-width:30px;text-align:right}

/* TABLE */
.c-table{grid-column:span 4;padding:22px 24px}
table{width:100%;border-collapse:collapse}
thead th{font-size:10px;font-weight:500;letter-spacing:.6px;text-transform:uppercase;color:var(--ink3);padding:0 12px 10px;border-bottom:1px solid var(--rim)}
thead th:not(:first-child){text-align:right}
.tr-cat td{padding:12px 12px 11px;border-bottom:1px solid var(--ink4);cursor:pointer;transition:background .18s}
.tr-cat:hover td,.tr-cat.hl td{background:var(--glass2)}
.tr-cat.hl td{border-color:rgba(79,163,255,.2)}
.tr-cat td:not(:first-child){text-align:right}
.cat-name{display:flex;align-items:center;gap:11px;font-weight:600;font-size:13.5px}
.cat-chip{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.cat-sub-txt{font-size:11px;color:var(--ink3);font-weight:400;margin-top:1px}
.ea{margin-left:auto;font-size:11px;color:var(--ink3);transition:transform .22s;display:inline-block}
.expanded .ea{transform:rotate(90deg)}
.tr-sub{display:none}
.tr-sub.show{display:table-row}
.tr-sub td{padding:7px 12px 7px 55px;border-bottom:1px solid rgba(255,255,255,.03);font-size:12.5px;color:var(--ink2)}
.tr-sub td:not(:first-child){text-align:right}
.sub-nw{display:flex;align-items:center;gap:7px}
.sub-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.td-chg{font-weight:600}
.td-chg.up{color:var(--green)}.td-chg.dn{color:var(--coral)}
.mini-bar{display:inline-flex;align-items:center;gap:7px;justify-content:flex-end}
.mbar{width:48px;height:3px;border-radius:2px;background:var(--glass3);overflow:hidden}
.mfill{height:100%;border-radius:2px}
.edit-btn{background:var(--glass2);border:1px solid var(--rim);border-radius:6px;padding:2px 7px;font-size:10.5px;color:var(--ink3);cursor:pointer;transition:all .15s;margin-left:6px}
.edit-btn:hover{border-color:var(--blue);color:var(--blue)}

/* GOAL */
.c-goal{grid-column:span 2;padding:22px 20px}
.g-track{position:relative;height:7px;border-radius:4px;background:var(--glass3);margin:12px 0 8px;overflow:visible}
.g-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue),var(--violet));box-shadow:0 0 9px rgba(79,163,255,.38);transition:width .8s cubic-bezier(.22,1,.36,1);position:relative}
.g-fill::after{content:'';position:absolute;right:-4px;top:-4px;width:15px;height:15px;border-radius:50%;background:var(--blue);box-shadow:0 0 0 3px var(--bg),0 0 9px var(--blue)}
.L .g-fill::after{box-shadow:0 0 0 3px var(--bg3),0 0 9px var(--blue)}
.g-lbls{display:flex;justify-content:space-between;font-size:11px;color:var(--ink3)}
.g-chips{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap}
.gchip{padding:4px 9px;border-radius:7px;font-size:11px;border:1px solid var(--rim);color:var(--ink2);transition:all .3s}
.gchip.done{border-color:rgba(62,207,142,.28);color:var(--green);background:var(--green2)}
.gchip.just-done{animation:milestone .8s cubic-bezier(.22,1,.36,1)}
@keyframes milestone{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}

/* MONTHLY SUMMARY */
.c-summary{grid-column:span 2;padding:22px 20px}
.summary-txt{font-size:13px;color:var(--ink2);line-height:1.75;margin-top:6px}
.summary-txt strong{color:var(--ink)}
.summary-txt .tag{display:inline-block;padding:1px 6px;border-radius:5px;font-size:11px;font-weight:600;margin:0 2px}

/* LOG */
.c-log{grid-column:span 2;padding:22px 20px}
.log-scroll{max-height:190px;overflow-y:auto;margin-top:4px}
.log-scroll::-webkit-scrollbar{width:3px}
.log-scroll::-webkit-scrollbar-thumb{background:var(--rim2);border-radius:2px}
.li{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--ink4);font-size:12px}
.li:last-child{border:none}
.ll{width:2px;height:26px;border-radius:1px;flex-shrink:0}
.lm{flex:1;color:var(--ink2);line-height:1.4}
.lt{font-size:10.5px;color:var(--ink3);white-space:nowrap}

/* RULES PAGE */
.c-rules{grid-column:span 4;padding:22px 24px}
.rules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-top:12px}
.rule-item{background:var(--glass);border:1px solid var(--rim);border-radius:11px;padding:10px 14px;display:flex;align-items:center;gap:10px;transition:border-color .18s}
.rule-item:hover{border-color:var(--rim2)}
.rule-kw{font-size:12.5px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rule-cat{font-size:11px;color:var(--ink3)}
.rule-del{background:none;border:none;color:var(--ink3);cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px;transition:color .15s;flex-shrink:0}
.rule-del:hover{color:var(--coral)}

/* DEBT TRACKER */
.c-debt{grid-column:span 2;padding:22px 20px}
.debt-item{background:var(--glass);border:1px solid var(--rim);border-radius:12px;padding:14px 16px;margin-top:10px}
.debt-name{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.debt-progress{height:5px;border-radius:3px;background:var(--glass3);overflow:hidden;margin-bottom:6px}
.debt-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--coral),#ff9472);transition:width .6s}
.debt-meta{font-size:11px;color:var(--ink3);display:flex;justify-content:space-between}
.debt-add-btn{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--blue);cursor:pointer;margin-top:12px;background:none;border:none;padding:0}

/* EMPTY */
.empty-state{grid-column:span 4;padding:60px 24px;text-align:center}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-h{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:8px}
.empty-s{font-size:13px;color:var(--ink2);margin-bottom:24px}
.empty-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(79,163,255,.28),rgba(79,163,255,.13));border:1px solid rgba(79,163,255,.42);border-radius:14px;padding:11px 22px;font-size:13px;font-weight:600;color:var(--blue);cursor:pointer;transition:all .2s}
.empty-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(79,163,255,.2)}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.58);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .28s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg3);border:1px solid var(--rim2);border-radius:26px;width:560px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;transform:translateY(16px) scale(.985);transition:transform .28s cubic-bezier(.22,1,.36,1);box-shadow:0 40px 80px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.04) inset}
.overlay.open .modal{transform:none}
.m-tabs{display:flex;border-bottom:1px solid var(--rim);padding:0 24px;flex-shrink:0}
.m-tab{padding:16px 14px 14px;font-size:12.5px;font-weight:500;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.m-tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.m-body{padding:24px;overflow-y:auto;flex:1}
.m-body::-webkit-scrollbar{width:3px}
.m-body::-webkit-scrollbar-thumb{background:var(--rim2);border-radius:2px}
.paste-hint{font-size:12px;color:var(--ink2);margin-bottom:10px;line-height:1.7;padding:11px 14px;background:var(--glass);border:1px solid var(--rim);border-radius:11px}
.paste-hint strong{color:var(--ink)}
.paste-hint code{background:var(--glass3);border-radius:4px;padding:1px 5px;font-size:11px;font-family:monospace;color:var(--blue)}
.paste-area{width:100%;min-height:100px;background:var(--glass3);border:1px solid var(--rim);border-radius:var(--r2);padding:13px 15px;font-size:13px;color:var(--ink);font-family:'DM Sans',sans-serif;resize:vertical;outline:none;transition:border-color .2s,box-shadow .2s;line-height:1.6;margin-bottom:12px}
.paste-area::placeholder{color:var(--ink3)}
.paste-area:focus{border-color:rgba(79,163,255,.45);box-shadow:0 0 0 3px rgba(79,163,255,.09)}
.parse-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:linear-gradient(135deg,rgba(79,163,255,.22),rgba(155,140,255,.15));border:1px solid rgba(79,163,255,.35);border-radius:var(--r2);padding:12px;font-size:13px;font-weight:600;color:var(--blue);cursor:pointer;transition:all .2s;margin-bottom:16px}

<script>
const SUPABASE_URL='https://awpexkfersmaetzsgoik.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3cGV4a2ZlcnNtYWV0enNnb2lrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjMxMTcsImV4cCI6MjA5NDMzOTExN30.LJzPLYu-evBVH_XCRZfqVMW08Fnr2d9ktmT1yR3r4l8';
const DEFAULT_PIN='2071';
const PIN_KEY='nw_pin';
const RETIREMENT_GOAL=30000000;
const CATS=[{name:'現金 ／ 存款',icon:'💵',color:'#4fa3ff'},{name:'台股 ETF',icon:'📈',color:'#3ecf8e'},{name:'美股 ETF',icon:'🌐',color:'#9b8cff'},{name:'基金',icon:'📊',color:'#f5c842'},{name:'加密貨幣',icon:'₿',color:'#f97316'},{name:'負債',icon:'🏦',color:'#ff6b6b'}];
const BUILTIN=[
  {kw:/集保/,cat:'台股 ETF',cur:'TWD'},
  {kw:/台股|0050|0056|0100|tse/i,cat:'台股 ETF',cur:'TWD'},
  {kw:/複委託|美股|voo|qqq|spy|iwm|schd|arkk/i,cat:'美股 ETF',cur:'USD'},
  {kw:/基金|fund/i,cat:'基金',cur:'TWD'},
  {kw:/btc|eth|usdt|usdc|幣|crypto|加密/i,cat:'加密貨幣',cur:'USD'},
  {kw:/貸款|房貸|信貸|負債|車貸/,cat:'負債',cur:'TWD'},
  {kw:/帳戶|存款|活存|定存|銀行|現金|儲蓄|saving/i,cat:'現金 ／ 存款',cur:'TWD'},
];

const {createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);

let FX=32.0,curMode='twd',light=false,allExpanded=false;
let currentMonth=null,currentData=null,parsedItems=[],activeTab=0;
let tChart=null,dChart=null,dbRules={};
let allTrendData=[]; // 快取所有趨勢資料
let trendStartIdx=0; // 滑軸起始 index
let prevNetForMilestone=null;
let debtItems=[]; // localStorage 存的負債追蹤

/* ── PIN ── */
let pin='';
function getPin(){return localStorage.getItem(PIN_KEY)||DEFAULT_PIN}
function np(d){if(pin.length>=4)return;pin+=d;updDots();if(pin.length===4)setTimeout(npS,120)}
function npD(){pin=pin.slice(0,-1);updDots()}
function updDots(err){for(let i=0;i<4;i++){const e=document.getElementById('p'+i);e.className='pd'+(i<pin.length?' on':'')+(err?' err':'')}}
function npS(){
  if(pin===getPin()){
    const ls=document.getElementById('loginScreen');ls.style.opacity='0';ls.style.pointerEvents='none';
    setTimeout(()=>{ls.style.display='none';initApp()},500);
  }else{updDots(true);document.getElementById('lcErr').textContent='PIN 碼錯誤';setTimeout(()=>{pin='';updDots();document.getElementById('lcErr').textContent=''},800)}
}
document.addEventListener('keydown',e=>{
  const ls=document.getElementById('loginScreen');if(ls.style.display==='none'||ls.style.opacity==='0')return;
  if(e.key>='0'&&e.key<='9')np(e.key);if(e.key==='Backspace')npD();if(e.key==='Enter')npS();
});

/* ── INIT ── */
async function initApp(){
  showLoading('載入資料中…');document.getElementById('app').style.display='block';
  debtItems=JSON.parse(localStorage.getItem('nw_debts')||'[]');
  await Promise.all([fetchFX(),loadDbRules()]);
  await loadAllTrendData();
  await loadAvailableMonths();
  hideLoading();
}
async function fetchFX(){
  try{const r=await fetch('https://open.er-api.com/v6/latest/USD');const d=await r.json();if(d.rates?.TWD)FX=d.rates.TWD}catch(e){FX=32.0}
  document.getElementById('rLbl').textContent=`1 USD = ${FX.toFixed(2)} TWD（即時）`;
}
async function loadDbRules(){
  const{data}=await db.from('classification_rules').select('*');
  if(data)data.forEach(r=>{dbRules[r.keyword.toLowerCase()]={category:r.category,currency:r.currency}});
}

/* ── TREND DATA: 一次查詢所有資料 ── */
async function loadAllTrendData(){
  // 用一次 JOIN 查詢取得所有月份的淨資產
  const{data:recs}=await db.from('monthly_records').select('id,year,month').order('year').order('month');
  if(!recs||recs.length===0){allTrendData=[];return}
  // batch 取 items
  const ids=recs.map(r=>r.id);
  const{data:items}=await db.from('asset_items').select('record_id,amount_twd,category').in('record_id',ids);
  const itemMap={};
  (items||[]).forEach(it=>{if(!itemMap[it.record_id])itemMap[it.record_id]=[];itemMap[it.record_id].push(it)});
  allTrendData=recs.map(rec=>{
    const its=itemMap[rec.id]||[];
    const net=its.filter(i=>i.category!=='負債').reduce((s,i)=>s+i.amount_twd,0)-its.filter(i=>i.category==='負債').reduce((s,i)=>s+i.amount_twd,0);
    return{year:rec.year,month:rec.month,net:Math.round(net),label:`${rec.year}/${rec.month}`};
  });
  trendStartIdx=0; // 預設全部
}

/* ── CLASSIFIER ── */
function classify(name,rawLine){
  const n=name.toLowerCase();const raw=(rawLine||'').toLowerCase();
  for(const[kw,rule]of Object.entries(dbRules)){if(n.includes(kw)||raw.includes(kw))return rule}
  for(const rule of BUILTIN){if(rule.kw.test(name)||rule.kw.test(rawLine||''))return{category:rule.cat,currency:rule.cur}}
  return{category:'現金 ／ 存款',currency:'TWD'}
}
function parseLine(line){
  const clean=line.trim();if(!clean)return null;
  const isUSD=/\b(USD|美元|美金)\b/i.test(clean);
  const numMatch=clean.match(/[\d,]+(\.\d+)?/);if(!numMatch)return null;
  const amt=parseFloat(numMatch[0].replace(/,/g,''));if(!amt||amt<=0)return null;
  const name=clean.replace(/[\d,]+(\.\d+)?/,'').replace(/\b(USD|TWD|美元|美金|台幣)\b/gi,'').replace(/[（）()【】\[\]]/g,' ').replace(/\s+/g,' ').trim();
  if(!name)return null;
  const r=classify(name,clean);
  return{name,amt,cat:r.category,cur:isUSD?'USD':r.currency}
}
function runParse(){
  const txt=document.getElementById('pasteArea').value.trim();
  if(!txt){showToast('請先貼上資產文字','err');return}
  const lines=txt.split(/[\n,，、;；]+/).map(s=>s.trim()).filter(Boolean);
  parsedItems=lines.map(parseLine).filter(Boolean);
  if(!parsedItems.length){showToast('找不到有效的金額資料','err');return}
  // 顯示年月確認
  const y=document.getElementById('py').value,m=document.getElementById('pm').value;
  const pc=document.getElementById('periodConfirm'),pt=document.getElementById('periodTxt');
  if(y&&m){pc.style.display='flex';pt.textContent=`${y} 年 ${m} 月`}
  renderParsed();
}
function renderParsed(){
  const sec=document.getElementById('parsedSection'),list=document.getElementById('parsedList'),count=document.getElementById('parsedCount');
  sec.style.display='block';count.textContent=`✓ ${parsedItems.length} 筆`;list.innerHTML='';
  parsedItems.forEach((item,i)=>{
    const cat=CATS.find(c=>c.name===item.cat)||CATS[0];
    const div=document.createElement('div');div.className='pi';div.id=`pi${i}`;
    div.innerHTML=`<div class="pi-icon">${cat.icon}</div><div class="pi-info"><div class="pi-name">${item.name}</div><div class="pi-row"><span class="pi-badge" id="pib${i}" style="background:${cat.color}22;color:${cat.color}">${item.cat}</span><span class="pi-cur">${item.cur}</span><button class="pi-change-btn" onclick="toggleSel(${i})">改分類</button></div><select class="pi-select" id="pis${i}" style="display:none" onchange="applyChange(${i},this.value)">${CATS.map(c=>`<option value="${c.name}"${c.name===item.cat?' selected':''}>${c.icon} ${c.name}</option>`).join('')}</select></div><div class="pi-amt">$${item.amt.toLocaleString()}</div>`;
    list.appendChild(div);
  });
}
function toggleSel(i){const s=document.getElementById(`pis${i}`);s.style.display=s.style.display==='none'?'block':'none'}
async function applyChange(i,newCat){
  parsedItems[i].cat=newCat;
  const cat=CATS.find(c=>c.name===newCat)||CATS[0];
  const b=document.getElementById(`pib${i}`),ic=document.querySelector(`#pi${i} .pi-icon`);

  if(kw){
    await db.from('classification_rules').upsert({keyword:kw,category:newCat,currency:parsedItems[i].cur},{onConflict:'keyword'});
    dbRules[kw]={category:newCat,currency:parsedItems[i].cur};

async function loadAvailableMonths(){
  const{data}=await db.from('monthly_records').select('id,year,month').order('year',{ascending:false}).order('month',{ascending:false});
  if(data&&data.length>0){currentMonth={year:data[0].year,month:data[0].month};await loadMonthData()}
  else{currentMonth={year:new Date().getFullYear(),month:new Date().getMonth()+1};updateMonthLabel();renderEmpty()}
}
async function loadMonthData(){
  showLoading('載入資料中…');updateMonthLabel();
  const{data:rec}=await db.from('monthly_records').select('*').eq('year',currentMonth.year).eq('month',currentMonth.month).maybeSingle();
  if(!rec){
    // 找到最近一筆提示
    const{data:nearest}=await db.from('monthly_records').select('year,month').order('year',{ascending:false}).order('month',{ascending:false}).limit(1).maybeSingle();
    currentData=null;renderEmpty(nearest);hideLoading();return;
  }
  const{data:items}=await db.from('asset_items').select('*').eq('record_id',rec.id).order('amount_twd',{ascending:false});
  let py=currentMonth.year,pm=currentMonth.month-1;if(pm<1){pm=12;py--}
  const{data:prec}=await db.from('monthly_records').select('*').eq('year',py).eq('month',pm).maybeSingle();
  let prevItems=[];
  if(prec){const{data:pi}=await db.from('asset_items').select('*').eq('record_id',prec.id);prevItems=pi||[]}
  // 計算上個月淨資產（用於里程碑檢查）
  prevNetForMilestone=prevItems.length>0
    ?prevItems.filter(i=>i.category!=='負債').reduce((s,i)=>s+i.amount_twd,0)-prevItems.filter(i=>i.category==='負債').reduce((s,i)=>s+i.amount_twd,0)
    :null;
  currentData={record:rec,items:items||[],prevItems,prevRecord:prec||null};
  hideLoading();renderDashboard();
}

/* ── SUMMARY ── */
function buildSummary(net,netChg,netChgPct,catTotals,prevCT,totalA){
  if(!netChg)return`首次記錄！淨資產 <strong>$${Math.round(net).toLocaleString()}</strong>，開始追蹤你的財富成長旅程 🚀`;
  const dir=netChg>=0?'成長':'下滑';
  // 找最大貢獻類別
  let maxCat=null,maxChg=0;
  CATS.filter(c=>c.name!=='負債').forEach(c=>{const chg=(catTotals[c.name]||0)-(prevCT[c.name]||0);if(Math.abs(chg)>Math.abs(maxChg)){maxChg=chg;maxCat=c}});
  const catContrib=maxCat?`，主要來自 <span class="tag" style="background:${maxCat.color}22;color:${maxCat.color}">${maxCat.name} ${maxChg>=0?'+':''}${Math.round(maxChg/10000).toFixed(0)}萬</span>`:'';
  // 最大比重
  const topCat=CATS.filter(c=>c.name!=='負債').sort((a,b)=>(catTotals[b.name]||0)-(catTotals[a.name]||0))[0];
  const topPct=topCat?((catTotals[topCat.name]||0)/totalA*100).toFixed(0):0;
  return`本月淨資產${dir} <strong>${netChg>=0?'+':''}${netChgPct}%</strong>（${netChg>=0?'▲':'▼'} $${Math.abs(Math.round(netChg)).toLocaleString()}）${catContrib}。目前佔比最高為 <span class="tag" style="background:${topCat?.color}22;color:${topCat?.color}">${topCat?.name} ${topPct}%</span>。`;
}

/* ── TABLE ── */
function renderTable(catTotals,catSubs,prevCT,totalA){
  const tb=document.getElementById('aTbody');if(!tb)return;tb.innerHTML='';
  CATS.forEach((c,ci)=>{
    const cur=catTotals[c.name]||0,prev=prevCT[c.name]||0;
    // 子項目依金額降冪
    const subs=(catSubs[c.name]||[]).slice().sort((a,b)=>b.amount_twd-a.amount_twd);
    if(cur===0&&subs.length===0)return;
    const chg=cur-prev,pct=totalA>0?(cur/totalA*100).toFixed(1):'0.0';
    const tr=document.createElement('tr');tr.className='tr-cat';tr.id='cat'+ci;
    tr.innerHTML=`<td><div class="cat-name"><div class="cat-chip" style="background:${c.color}1a">${c.icon}</div><div><div>${c.name}</div><div class="cat-sub-txt">${subs.length} 個子項目</div></div><span class="ea">›</span></div></td><td>$${Math.round(cur).toLocaleString()}</td><td style="color:var(--ink3)">$${Math.round(prev).toLocaleString()}</td><td class="td-chg ${chg>=0?'up':'dn'}">${chg>=0?'▲':'▼'} ${Math.abs(Math.round(chg)).toLocaleString()}</td><td><div class="mini-bar"><div class="mbar"><div class="mfill" style="width:${pct}%;background:${c.color}"></div></div><span style="font-size:11.5px;color:var(--ink2)">${pct}%</span></div></td>`;

    subs.forEach((s,si)=>{
      const tr2=document.createElement('tr');tr2.className='tr-sub';tr2.id=`sub${ci}_${si}`;

      tr2.innerHTML=`<td><div class="sub-nw"><div class="sub-dot" style="background:${c.color}99"></div>${s.name}${origNote}</div></td><td>$${Math.round(s.amount_twd).toLocaleString()}</td><td style="color:var(--ink3)">—</td><td style="color:var(--ink3)">—</td><td style="color:var(--ink3);font-size:11.5px">${totalA>0?(s.amount_twd/totalA*100).toFixed(1):'0.0'}%</td>`;
      tb.appendChild(tr2);
    });
  });
}

/* ── DONUT ── */
function buildDonutChart(catTotals,totalA){
  if(dChart){dChart.destroy();dChart=null}

  const pos=CATS.filter(c=>catTotals[c.name]>0&&c.name!=='負債');

    options:{responsive:false,cutout:'67%',plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(13,13,24,.9)',callbacks:{label:c=>' $'+Math.round(c.raw).toLocaleString()}}},
    onClick:(e,els)=>{if(els.length){const idx=els[0].index;const cat=pos[idx];highlightCat(CATS.indexOf(cat))}}}});
}
function gc(){return light?'rgba(22,22,30,.07)':'rgba(255,255,255,.07)'}
function tc(){return light?'rgba(22,22,30,.35)':'rgba(238,238,245,.35)'}

/* ── DEBT TRACKER ── */
function renderDebtList(){
  const dl=document.getElementById('debtList');if(!dl)return;
  if(!debtItems.length){dl.innerHTML='<div style="font-size:12px;color:var(--ink3);padding:8px 0">尚未新增負債項目</div>';return}
  dl.innerHTML=debtItems.map((d,i)=>{
    const pct=Math.round((1-d.remain/d.total)*100);
    const paidAmt=Math.round(d.total-d.remain);
    return`<div class="debt-item"><div class="debt-name"><span>${d.name}</span><button onclick="removeDebt(${i})" style="background:none;border:none;color:var(--ink3);cursor:pointer;font-size:12px">✕</button></div><div class="debt-progress"><div class="debt-fill" style="width:${pct}%"></div></div><div class="debt-meta"><span>已還 $${paidAmt.toLocaleString()}（${pct}%）</span><span>預計 ${d.date||'—'} 還清</span></div></div>`;
  }).join('');
}
function saveDebtItem(){
  const name=document.getElementById('d-name').value.trim();
  const total=parseFloat(document.getElementById('d-total').value)||0;
  const remain=parseFloat(document.getElementById('d-remain').value)||0;
  const date=document.getElementById('d-date').value;
  if(!name||!total){showToast('請填入名稱和原始金額','err');return}
  debtItems.push({name,total,remain,date});
  localStorage.setItem('nw_debts',JSON.stringify(debtItems));
  document.getElementById('debtOv').classList.remove('open');
  renderDebtList();
  showToast('✓ 負債項目已新增');
}
function removeDebt(i){debtItems.splice(i,1);localStorage.setItem('nw_debts',JSON.stringify(debtItems));renderDebtList()}

/* ── EDIT MODAL ── */
function openEditModal(){
  if(!currentData){showToast('請先選擇有資料的月份','err');return}
  const{items,record}=currentData;
  document.getElementById('editTitle').textContent='編輯記錄';
  document.getElementById('editSub').textContent=`${record.year} 年 ${record.month} 月 — 點擊項目可修改或刪除`;
  const list=document.getElementById('editItemList');
  list.innerHTML='';
  // 依金額降冪
  const sorted=[...items].sort((a,b)=>b.amount_twd-a.amount_twd);
  sorted.forEach(item=>{
    const cat=CATS.find(c=>c.name===item.category)||CATS[0];
    const div=document.createElement('div');div.className='edit-item-row';
    div.innerHTML=`<div class="ei-icon">${cat.icon}</div><div class="ei-name">${item.name}</div><div class="ei-amt">$${Math.round(item.amount_twd).toLocaleString()}</div><button class="ei-edit" onclick="openInlineEdit('${item.id}')">編輯</button><button class="ei-del" onclick="deleteItem('${item.id}')">刪除</button>`;
    list.appendChild(div);
  });
  document.getElementById('editOv').classList.add('open');
}
function closeEditModal(){document.getElementById('editOv').classList.remove('open')}

function openInlineEdit(itemId){
  const item=currentData.items.find(i=>i.id===itemId);if(!item)return;
  document.getElementById('inlineEditSub').textContent=item.name;
  document.getElementById('ie-name').value=item.name;
  document.getElementById('ie-amt').value=item.amount_original;
  document.getElementById('ie-cur').value=item.currency;
  const catSel=document.getElementById('ie-cat');
  catSel.innerHTML=CATS.map(c=>`<option value="${c.name}"${c.name===item.category?' selected':''}>${c.icon} ${c.name}</option>`).join('');
  document.getElementById('inlineEditSave').onclick=()=>saveInlineEdit(itemId);
  document.getElementById('inlineEditOv').classList.add('open');
}
async function saveInlineEdit(itemId){
  const name=document.getElementById('ie-name').value.trim();
  const amt=parseFloat(document.getElementById('ie-amt').value)||0;
  const cur=document.getElementById('ie-cur').value;
  const cat=document.getElementById('ie-cat').value;
  if(!name||!amt){showToast('請填入名稱和金額','err');return}
  const amtTwd=cur==='USD'?Math.round(amt*FX):amt;
  const{error}=await db.from('asset_items').update({name,category:cat,amount_original:amt,currency:cur,amount_twd:amtTwd}).eq('id',itemId);
  if(error){showToast('更新失敗：'+error.message,'err');return}
  await addLog('修改',`${name} → $${amt.toLocaleString()} ${cur}`);
  document.getElementById('inlineEditOv').classList.remove('open');
  showToast('✓ 已更新');
  await loadMonthData();
  openEditModal();
}
async function deleteItem(itemId){
  const item=currentData.items.find(i=>i.id===itemId);
  if(!confirm(`確定刪除「${item?.name}」？`))return;
  const{error}=await db.from('asset_items').delete().eq('id',itemId);
  if(error){showToast('刪除失敗','err');return}
  await addLog('刪除',item?.name||'');
  showToast('已刪除');
  await loadAllTrendData();
  await loadMonthData();
  openEditModal();
}

/* ── LOG ── */
async function loadLog(){
  const ll=document.getElementById('logList');if(!ll)return;
  const{data}=await db.from('activity_log').select('*').order('created_at',{ascending:false}).limit(20);
  if(!data||data.length===0){ll.innerHTML='<div style="color:var(--ink3);font-size:12px;padding:8px 0">尚無記錄</div>';return}
  const colors={'新增':'var(--green)','修改':'var(--blue)','規則':'var(--violet)','刪除':'var(--coral)'};
  ll.innerHTML=data.map(l=>{
    const color=Object.entries(colors).find(([k])=>l.action.includes(k))?.[1]||'var(--ink3)';
    const dt=new Date(l.created_at);
    const ts=`${(dt.getMonth()+1).toString().padStart(2,'0')}-${dt.getDate().toString().padStart(2,'0')} ${dt.getHours().toString().padStart(2,'0')}:${dt.getMinutes().toString().padStart(2,'0')}`;
    return`<div class="li"><div class="ll" style="background:${color}"></div><div class="lm">${l.action}${l.detail?'：'+l.detail:''}</div><div class="lt">${ts}</div></div>`;
  }).join('');
}
async function addLog(action,detail=''){await db.from('activity_log').insert({action,detail})}

/* ── RULES TAB ── */
async function loadRulesTab(){
  const grid=document.getElementById('rulesGrid');if(!grid)return;
  await loadDbRules();
  const entries=Object.entries(dbRules);
  if(!entries.length){grid.innerHTML='<div style="color:var(--ink3);font-size:12px">尚無自訂規則</div>';return}
  const cat=k=>dbRules[k];
  grid.innerHTML=entries.map(([kw,rule])=>{
    const c=CATS.find(c=>c.name===rule.category)||CATS[0];
    return`<div class="rule-item"><div><div class="rule-kw">${kw}</div><div class="rule-cat" style="color:${c.color}">${c.icon} ${rule.category}</div></div><button class="rule-del" onclick="deleteRule('${kw}')">✕</button></div>`;
  }).join('');
}
async function deleteRule(kw){
  await db.from('classification_rules').delete().eq('keyword',kw);
  delete dbRules[kw];
  await loadRulesTab();
  showToast(`已刪除規則：${kw}`);
}

/* ── MONTH NAV ── */
function updateMonthLabel(){document.getElementById('mLbl').textContent=`${currentMonth.year} 年 ${currentMonth.month} 月`}
async function shiftMonth(d){
  let{year,month}=currentMonth;month+=d;if(month>12){month=1;year++}if(month<1){month=12;year--}
  currentMonth={year,month};await loadMonthData();
}

/* ── CURRENCY / THEME ── */
function setCur(m,b){curMode=m;document.querySelectorAll('.cpill').forEach(x=>x.classList.remove('on'));b.classList.add('on');if(currentData)renderDashboard()}
function toggleTheme(){
  light=!light;document.body.classList.toggle('L',light);
  document.getElementById('thBtn').textContent=light?'☀️ 淺色':'🌙 深色';
  if(tChart){tChart.options.scales.x.grid.color=gc();tChart.options.scales.y.grid.color=gc();tChart.options.scales.x.ticks.color=tc();tChart.options.scales.y.ticks.color=tc();tChart.update()}
}

/* ── MODAL ── */
function openModal(){
  const now=new Date();
  ['py','my'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=now.getFullYear()});
  ['pm','mm'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=now.getMonth()+1});
  parsedItems=[];document.getElementById('parsedSection').style.display='none';document.getElementById('pasteArea').value='';
  document.getElementById('periodConfirm').style.display='none';
  document.getElementById('ov').classList.add('open');
  switchTab(0,document.querySelector('.m-tab'));
  document.getElementById('mainActions').style.display='flex';
}
function closeModal(){document.getElementById('ov').classList.remove('open')}
function switchTab(i,el){
  ['tab0','tab1','tab2'].forEach((id,j)=>{const t=document.getElementById(id);if(t)t.style.display=j===i?'block':'none'});
  document.querySelectorAll('.m-tab').forEach((t,j)=>t.classList.toggle('on',j===i));
  activeTab=i;
  const ma=document.getElementById('mainActions');
  if(ma)ma.style.display=i===2?'none':'flex';
  if(i===2)loadRulesTab();
}

/* ── SAVE ── */
async function saveRecord(){
  const btn=document.getElementById('saveBtn');btn.disabled=true;btn.textContent='儲存中…';
  let year,month,itemsToSave=[];
  if(activeTab===0){
    year=parseInt(document.getElementById('py').value);month=parseInt(document.getElementById('pm').value);
    if(!parsedItems.length){showToast('請先解析資產文字','err');btn.disabled=false;btn.textContent='儲存記錄';return}
    itemsToSave=parsedItems;
  }else{
    year=parseInt(document.getElementById('my').value);month=parseInt(document.getElementById('mm').value);
    const fields=[{id:'m-cash',cat:'現金 ／ 存款',cur:'TWD',name:'現金存款'},{id:'m-tw',cat:'台股 ETF',cur:'TWD',name:'台股 ETF'},{id:'m-fund',cat:'基金',cur:'TWD',name:'基金'},{id:'m-us',cat:'美股 ETF',cur:'USD',name:'美股 ETF'},{id:'m-crypto',cat:'加密貨幣',cur:'USD',name:'加密貨幣'},{id:'m-debt',cat:'負債',cur:'TWD',name:'負債'}];
    fields.forEach(f=>{const v=parseFloat(document.getElementById(f.id).value)||0;if(v>0)itemsToSave.push({name:f.name,amt:v,cat:f.cat,cur:f.cur})});
    if(!itemsToSave.length){showToast('請至少輸入一個項目','err');btn.disabled=false;btn.textContent='儲存記錄';return}
  }
  if(!year||!month||year<2000||month<1||month>12){showToast('請填入正確的年份和月份','err');btn.disabled=false;btn.textContent='儲存記錄';return}
  try{
    const{data:rec,error:re}=await db.from('monthly_records').upsert({year,month,usd_rate:FX,notes:document.getElementById('m-note')?.value||''},{onConflict:'year,month'}).select().single();
    if(re)throw re;
    await db.from('asset_items').delete().eq('record_id',rec.id);
    const rows=itemsToSave.map(it=>({record_id:rec.id,name:it.name,category:it.cat,amount_original:it.amt,currency:it.cur,amount_twd:it.cur==='USD'?Math.round(it.amt*FX):it.amt}));
    const{error:ie}=await db.from('asset_items').insert(rows);if(ie)throw ie;
    await addLog('新增',`${year}/${month} 月份（${rows.length} 筆）`);
    closeModal();showToast(`✓ ${year}/${month} 記錄已儲存`);
    currentMonth={year,month};
    await loadAllTrendData();
    await loadMonthData();
  }catch(e){showToast('儲存失敗：'+e.message,'err')}
  btn.disabled=false;btn.textContent='儲存記錄';
}

/* ── EMPTY ── */
function renderEmpty(nearest){
  const hint=nearest?`<div style="font-size:12px;color:var(--ink3);margin-bottom:16px">最近一筆資料：${nearest.year} 年 ${nearest.month} 月</div>`:'';
  document.getElementById('mainGrid').innerHTML=`<div class="card empty-state"><div class="empty-icon">📊</div><div class="empty-h">尚無 ${currentMonth.year} 年 ${currentMonth.month} 月的資料</div>${hint}<div class="empty-s">點擊下方按鈕新增本月資產記錄</div><button class="empty-btn" onclick="openModal()">＋ 新增記錄</button></div>`;
  if(tChart){tChart.destroy();tChart=null}if(dChart){dChart.destroy();dChart=null}
}

/* ── CONFETTI ── */
function triggerConfetti(){
  const wrap=document.createElement('div');wrap.className='confetti-wrap';document.body.appendChild(wrap);
  const colors=['#4fa3ff','#3ecf8e','#f5c842','#9b8cff','#ff6b6b'];
  for(let i=0;i<60;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1+Math.random()*2}s;animation-delay:${Math.random()*.5}s;width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;border-radius:${Math.random()>0.5?'50%':'2px'}`;
    wrap.appendChild(p);
  }
  setTimeout(()=>wrap.remove(),4000);
}

/* ── UTILS ── */
function showLoading(txt){const s=document.getElementById('loadingScreen');s.style.display='flex';document.getElementById('loadTxt').textContent=txt}
function hideLoading(){document.getElementById('loadingScreen').style.display='none'}
let toastTimer;
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(type==='err'?' err':'');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3200)}
</script>
